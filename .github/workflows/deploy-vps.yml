# ============================================================================
# CALIRAL INSIGHT - Deploy automático a VPS via SSH
# ============================================================================
# Este workflow se ejecuta cuando publicas un release (git tag v*)
# y despliega automáticamente a tu servidor via SSH.
#
# CONFIGURACIÓN NECESARIA (Settings → Secrets and variables → Actions):
#   - SSH_HOST: IP o dominio de tu servidor (ej: 123.45.67.89)
#   - SSH_USER: usuario SSH (ej: deploy o root)
#   - SSH_PRIVATE_KEY: clave privada SSH (contenido del archivo id_ed25519)
#   - SSH_PORT: puerto SSH (default: 22)
#   - DEPLOY_PATH: ruta en el servidor (ej: /opt/caliral)
#   - JWT_SECRET: secreto JWT para producción
#   - POSTGRES_PASSWORD: password de PostgreSQL
#
# Una vez configurado, para desplegar:
#   git tag v1.0.0
#   git push origin v1.0.0
# ============================================================================

name: Deploy to VPS

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Versión a desplegar (latest o tag)'
        required: false
        default: 'latest'

jobs:
  deploy:
    name: Deploy via SSH
    runs-on: ubuntu-latest
    if: github.event_name == 'release' || github.event_name == 'workflow_dispatch'
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Create remote directory
        run: |
          ssh -p ${{ secrets.SSH_PORT || 22 }} ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            "mkdir -p ${{ secrets.DEPLOY_PATH }} && cd ${{ secrets.DEPLOY_PATH }} && \
             echo 'JWT_SECRET=${{ secrets.JWT_SECRET }}' > .env && \
             echo 'POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}' >> .env && \
             echo 'PORT=3000' >> .env"

      - name: Copy docker-compose.yml
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          source: "docker-compose.yml"
          target: ${{ secrets.DEPLOY_PATH }}

      - name: Deploy with Docker Compose
        run: |
          ssh -p ${{ secrets.SSH_PORT || 22 }} ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            "cd ${{ secrets.DEPLOY_PATH }} && \
             docker compose --env-file .env pull && \
             docker compose --env-file .env up -d --force-recreate && \
             docker image prune -f"

      - name: Health check
        run: |
          sleep 15
          ssh -p ${{ secrets.SSH_PORT || 22 }} ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            "curl -fsS http://localhost:3000 > /dev/null && \
             echo '✅ App respondiendo en http://localhost:3000' || \
             (echo '❌ App no responde' && docker compose -f ${{ secrets.DEPLOY_PATH }}/docker-compose.yml logs --tail 50 && exit 1)"

      - name: Summary
        run: |
          echo "### 🚀 Deploy completado" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Aplicación desplegada en: http://${{ secrets.SSH_HOST }}:3000" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Para ver logs:" >> $GITHUB_STEP_SUMMARY
          echo '```bash' >> $GITHUB_STEP_SUMMARY
          echo "ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" >> $GITHUB_STEP_SUMMARY
          echo "cd ${{ secrets.DEPLOY_PATH }}" >> $GITHUB_STEP_SUMMARY
          echo "docker compose logs -f" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

# ============================================================================
# CALIRAL INSIGHT - Build & Publish Docker image to GitHub Container Registry
# ============================================================================
# Este workflow construye la imagen Docker en cada push a main
# y la publica en ghcr.io/sebasm2kuy/frimaral
#
# La imagen se puede usar en cualquier servidor con Docker:
#   docker run -d -p 3000:3000 \\
#     -e JWT_SECRET=tu-secreto \\
#     -e DATABASE_URL=file:/app/data/caliral.db \\
#     -v caliral_data:/app/data \\
#     ghcr.io/sebasm2kuy/frimaral:latest
# ============================================================================

name: Build & Publish Docker

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    name: Build & Push Docker image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-
            latest

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        if: github.event_name != 'pull_request'
        run: |
          echo "### ✅ Imagen Docker publicada" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Imagen disponible en:" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "ghcr.io/${{ env.IMAGE_NAME }}:latest" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Para ejecutarla:" >> $GITHUB_STEP_SUMMARY
          echo '```bash' >> $GITHUB_STEP_SUMMARY
          echo "docker run -d -p 3000:3000 \\" >> $GITHUB_STEP_SUMMARY
          echo "  -e JWT_SECRET=\$(openssl rand -base64 64) \\" >> $GITHUB_STEP_SUMMARY
          echo "  -e DATABASE_URL=file:/app/data/caliral.db \\" >> $GITHUB_STEP_SUMMARY
          echo "  -v caliral_data:/app/data \\" >> $GITHUB_STEP_SUMMARY
          echo "  --name caliral-insight \\" >> $GITHUB_STEP_SUMMARY
          echo "  ghcr.io/${{ env.IMAGE_NAME }}:latest" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

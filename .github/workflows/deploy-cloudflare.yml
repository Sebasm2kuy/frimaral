# ============================================================================
# CALIRAL INSIGHT - Deploy a Cloudflare Pages
# ============================================================================
# Cloudflare Pages es como GitHub Pages PERO con soporte para:
# - API Routes de Next.js (serverless functions)
# - Base de datos D1 (SQLite gratis)
# - Deploy automático desde GitHub en cada push
#
# SETUP:
# 1. Crear cuenta en https://dash.cloudflare.com/sign-up (gratis)
# 2. Pages → Create a project → Connect to Git
# 3. Seleccionar repo Sebasm2kuy/frimaral
# 4. Framework preset: Next.js
# 5. Build command: npx @cloudflare/next-on-pages
# 6. Build output directory: .vercel/output/static
# 7. Variables de entorno:
#    - NEXTAUTH_URL=https://caliral.pages.dev
#    - JWT_SECRET=<generar con openssl rand -base64 64>
#    - DATABASE_URL=<se configura automáticamente con D1 binding>
# 8. Crear binding D1: Settings → Functions → D1 database bindings
#    - Variable name: DB
#    - D1 database: caliral_insight (crear nueva si no existe)
# ============================================================================

name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

jobs:
  deploy:
    name: Deploy to Cloudflare Pages
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate Prisma client
        run: bunx prisma generate

      - name: Build for Cloudflare Pages
        run: bunx @cloudflare/next-on-pages
        env:
          NEXT_TELEMETRY_DISABLED: 1
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: caliral-insight
          directory: .vercel/output/static
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

      - name: Summary
        run: |
          echo "## 🚀 Deploy a Cloudflare Pages" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ App desplegada en: https://caliral-insight.pages.dev" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Credenciales de acceso" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "admin@caliral.com / admin123" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Para configurar base de datos D1" >> $GITHUB_STEP_SUMMARY
          echo "1. Ve a https://dash.cloudflare.com → Workers & Pages → D1" >> $GITHUB_STEP_SUMMARY
          echo "2. Crear base de datos: \`caliral_insight\`" >> $GITHUB_STEP_SUMMARY
          echo "3. En Pages → caliral-insight → Settings → Functions → D1 bindings" >> $GITHUB_STEP_SUMMARY
          echo "4. Añadir binding: Variable name=\`DB\`, Database=\`caliral_insight\`" >> $GITHUB_STEP_SUMMARY
          echo "5. Ejecutar migración (ver DEPLOY.md)" >> $GITHUB_STEP_SUMMARY

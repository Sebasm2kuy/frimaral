# ============================================================================
# CALIRAL INSIGHT - Deploy a GitHub Pages (versión estática demo)
# ============================================================================
# Replica exactamente el patrón del repo trazabilidad
# Build estático con Next.js export + datos JSON precargados
#
# URL final: https://sebasm2kuy.github.io/frimaral/
# ============================================================================

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build static site
        run: bun run build:static
        env:
          NEXT_PUBLIC_STATIC_MODE: 'true'
          NEXT_TELEMETRY_DISABLED: '1'

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages (attempt 1)
        id: deployment
        uses: actions/deploy-pages@v4
        continue-on-error: true
      - name: Wait and retry (attempt 2)
        if: steps.deployment.outcome == 'failure'
        run: sleep 30
      - name: Deploy to GitHub Pages (attempt 2)
        id: deployment2
        if: steps.deployment.outcome == 'failure'
        uses: actions/deploy-pages@v4
        continue-on-error: true
      - name: Wait and retry (attempt 3)
        if: steps.deployment2.outcome == 'failure'
        run: sleep 30
      - name: Deploy to GitHub Pages (attempt 3)
        id: deployment3
        if: steps.deployment2.outcome == 'failure'
        uses: actions/deploy-pages@v4

      - name: Summary
        if: always()
        run: |
          echo "## 🚀 Deploy a GitHub Pages" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.deployment3.outcome }}" = "success" ] || [ "${{ steps.deployment2.outcome }}" = "success" ] || [ "${{ steps.deployment.outcome }}" = "success" ]; then
            URL="${{ steps.deployment.outputs.page_url || steps.deployment2.outputs.page_url || steps.deployment3.outputs.page_url }}"
            echo "✅ **App desplegada en:** $URL" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Credenciales de demo" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "admin@caliral.com / admin123" >> $GITHUB_STEP_SUMMARY
            echo "comercial@caliral.com / comercial123" >> $GITHUB_STEP_SUMMARY
            echo "lector@caliral.com / lector123" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "⚠️ **Versión demo estática**: los datos mostrados son los del último build." >> $GITHUB_STEP_SUMMARY
            echo "Para funcionalidad completa (importar XLSB, IA en tiempo real) usar Docker o Cloudflare." >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Deploy falló. Revisa los logs." >> $GITHUB_STEP_SUMMARY
          fi

# ============================================================================
# CALIRAL INSIGHT - Procesar XLSB subido desde la app
# ============================================================================
# Este workflow se activa cuando se sube un archivo XLSB a data/raw/
# Procesa el archivo con el motor de inteligencia, genera los JSON estáticos,
# los commitea al repo, y luego el workflow de GitHub Pages los despliega.
# ============================================================================

name: Process Uploaded XLSB

on:
  push:
    paths:
      - 'data/raw/*.xlsb'
      - 'data/raw/*.xlsx'
      - 'data/raw/*.xls'
  workflow_dispatch:
    inputs:
      file:
        description: 'Archivo XLSB a procesar (ruta relativa)'
        required: false

permissions:
  contents: write

jobs:
  process:
    name: Process XLSB and generate JSON
    runs-on: ubuntu-latest
    if: github.actor == github.repository_owner || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate Prisma client
        run: bunx prisma generate

      - name: Initialize database
        run: bunx prisma db push

      - name: Find XLSB files to process
        id: find-files
        run: |
          # Detectar archivos subidos a data/raw/
          FILES=$(find data/raw -name "*.xlsb" -o -name "*.xlsx" -o -name "*.xls" 2>/dev/null || true)
          if [ -z "$FILES" ]; then
            echo "No se encontraron archivos XLSB para procesar"
            echo "has_files=false" >> $GITHUB_OUTPUT
          else
            echo "Archivos encontrados:"
            echo "$FILES"
            echo "has_files=true" >> $GITHUB_OUTPUT
            echo "files<<EOF" >> $GITHUB_OUTPUT
            echo "$FILES" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          fi

      - name: Process each XLSB file
        if: steps.find-files.outputs.has_files == 'true'
        run: |
          echo "${{ steps.find-files.outputs.files }}" | while read -r FILE; do
            if [ -n "$FILE" ]; then
              echo "📊 Procesando: $FILE"
              bun run scripts/process-uploaded-xlsb.ts "$FILE" || echo "⚠️ Error procesando $FILE"
            fi
          done

      - name: Verify JSON output
        run: |
          echo "=== JSON generados ==="
          ls -la public/data/ || echo "No se generaron JSON"
          echo ""
          echo "=== Tamaño ==="
          du -sh public/data/ || true

      - name: Commit processed JSON
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Añadir JSON generados
          git add public/data/ || true

          # Eliminar archivos raw ya procesados
          git rm -f data/raw/*.xlsb data/raw/*.xlsx data/raw/*.xls 2>/dev/null || true

          if git diff --staged --quiet; then
            echo "No hay cambios para commitear"
          else
            git commit -m "chore(data): procesar XLSB subido y actualizar JSON estáticos

            Procesado automáticamente por GitHub Action.
            Archivo: ${{ github.event.head_commit.message }}

            Generated by process-uploaded-xlsb.yml"

            git push
            echo "✅ JSON commiteados al repo"
          fi

      - name: Summary
        if: always()
        run: |
          echo "## 📊 Procesamiento de XLSB" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.find-files.outputs.has_files }}" = "true" ]; then
            echo "✅ Archivos procesados correctamente" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Archivos procesados" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "${{ steps.find-files.outputs.files }}" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Los JSON estáticos han sido actualizados y GitHub Pages se redesplegará automáticamente." >> $GITHUB_STEP_SUMMARY
          else
            echo "ℹ️ No se encontraron archivos XLSB para procesar" >> $GITHUB_STEP_SUMMARY
          fi

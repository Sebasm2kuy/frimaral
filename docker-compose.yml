# CALIRAL INSIGHT - Docker Compose para producción
# Despliegue completo: app + PostgreSQL

services:
  # Base de datos PostgreSQL
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: caliral
      POSTGRES_USER: caliral
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-caliral_change_me}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U caliral -d caliral"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Aplicación CALIRAL INSIGHT
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    environment:
      DATABASE_URL: "postgresql://caliral:${POSTGRES_PASSWORD:-caliral_change_me}@db:5432/caliral?schema=public"
      JWT_SECRET: ${JWT_SECRET:-change_me_in_production}
      NODE_ENV: production
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
